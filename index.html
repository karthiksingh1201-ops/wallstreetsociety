<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wall Street Society</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e8e2d0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .badge {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b59a5a;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1.08;
      color: #f0e9d6;
      margin-bottom: 12px;
    }

    h1 span { color: #c9a84c; }

    .tagline {
      font-size: 1rem;
      color: #8a8070;
      max-width: 420px;
      line-height: 1.7;
      margin: 0 auto 52px;
    }

    /* Bull & Bear SVG row */
    .animals {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 48px;
      margin-bottom: 52px;
    }

    .animal-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .animal-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6a6050;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 48px;
      justify-content: center;
      flex-wrap: wrap;
      border-top: 1px solid #1e1e1e;
      padding-top: 36px;
      margin-top: 8px;
      width: 100%;
      max-width: 560px;
    }

    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #c9a84c; }
    .stat-desc { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #5a5448; }

    .cta {
      margin-top: 36px;
      padding: 12px 32px;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .cta:hover { background: #c9a84c; color: #0a0a0a; }
  </style>
</head>
<body>

  <p class="badge">Est. 2025 &nbsp;·&nbsp; Finance Club</p>

  <h1>Wall Street<br/><span>Society</span></h1>

  <p class="tagline">
    Where markets meet minds. We study, debate, and decode
    the forces that move capital around the world.
  </p>

  <!-- Bull & Bear SVGs -->
  <div class="animals">

    <!-- BULL -->
    <div class="animal-block">
      <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="55" cy="68" rx="32" ry="22" fill="#1a3a1a" stroke="#2d6e2d" stroke-width="1.5"/>
        <!-- Head -->
        <ellipse cx="82" cy="52" rx="18" ry="15" fill="#1a3a1a" stroke="#2d6e2d" stroke-width="1.5"/>
        <!-- Horns -->
        <path d="M76 40 Q68 22 60 26" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M88 40 Q96 22 102 28" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <!-- Eye -->
        <circle cx="88" cy="48" r="2.5" fill="#c9a84c"/>
        <!-- Nose -->
        <ellipse cx="97" cy="55" rx="5" ry="3.5" fill="#2d6e2d"/>
        <!-- Legs -->
        <line x1="34" y1="88" x2="30" y2="108" stroke="#2d6e2d" stroke-width="5" stroke-linecap="round"/>
        <line x1="46" y1="89" x2="44" y2="108" stroke="#2d6e2d" stroke-width="5" stroke-linecap="round"/>
        <line x1="64" y1="89" x2="62" y2="108" stroke="#2d6e2d" stroke-width="5" stroke-linecap="round"/>
        <line x1="76" y1="88" x2="78" y2="108" stroke="#2d6e2d" stroke-width="5" stroke-linecap="round"/>
        <!-- Tail -->
        <path d="M24 65 Q14 60 18 52" stroke="#2d6e2d" stroke-width="2" stroke-linecap="round" fill="none"/>
        <!-- Arrow up (bullish) -->
        <path d="M50 18 L55 8 L60 18" fill="#2d6e2d"/>
        <line x1="55" y1="8" x2="55" y2="28" stroke="#2d6e2d" stroke-width="2"/>
      </svg>
      <span class="animal-label">Bull Market</span>
    </div>

    <!-- DIVIDER -->
    <div style="width:1px; height:80px; background:#1e1e1e; align-self:center;"></div>

    <!-- BEAR -->
    <div class="animal-block">
      <svg width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="55" cy="70" rx="30" ry="24" fill="#2a1a1a" stroke="#6e2d2d" stroke-width="1.5"/>
        <!-- Head -->
        <circle cx="30" cy="54" r="19" fill="#2a1a1a" stroke="#6e2d2d" stroke-width="1.5"/>
        <!-- Ears -->
        <circle cx="18" cy="38" r="7" fill="#2a1a1a" stroke="#6e2d2d" stroke-width="1.5"/>
        <circle cx="42" cy="37" r="7" fill="#2a1a1a" stroke="#6e2d2d" stroke-width="1.5"/>
        <!-- Eye -->
        <circle cx="22" cy="50" r="2.5" fill="#c9a84c"/>
        <!-- Snout -->
        <ellipse cx="14" cy="60" rx="8" ry="5" fill="#3a2222"/>
        <circle cx="12" cy="58" r="1.5" fill="#6e2d2d"/>
        <circle cx="16" cy="58" r="1.5" fill="#6e2d2d"/>
        <!-- Legs -->
        <line x1="34" y1="92" x2="30" y2="108" stroke="#6e2d2d" stroke-width="5" stroke-linecap="round"/>
        <line x1="46" y1="93" x2="44" y2="108" stroke="#6e2d2d" stroke-width="5" stroke-linecap="round"/>
        <line x1="64" y1="93" x2="62" y2="108" stroke="#6e2d2d" stroke-width="5" stroke-linecap="round"/>
        <line x1="76" y1="92" x2="78" y2="108" stroke="#6e2d2d" stroke-width="5" stroke-linecap="round"/>
        <!-- Tail -->
        <path d="M84 68 Q96 62 92 54" stroke="#6e2d2d" stroke-width="2" stroke-linecap="round" fill="none"/>
        <!-- Arrow down (bearish) -->
        <path d="M60 8 L65 18 L70 8" fill="#6e2d2d"/>
        <line x1="65" y1="18" x2="65" y2="28" stroke="#6e2d2d" stroke-width="2"/>
      </svg>
      <span class="animal-label">Bear Market</span>
    </div>

  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-num">100+</span>
      <span class="stat-desc">Members</span>
    </div>
    <div class="stat">
      <span class="stat-num">20+</span>
      <span class="stat-desc">Events / Year</span>
    </div>
    <div class="stat">
      <span class="stat-num">∞</span>
      <span class="stat-desc">Market Debates</span>
    </div>
  </div>

  <a class="cta" href="mailto:contact@wallstreetsociety.in">Join the Society</a>

</body>
</html>
